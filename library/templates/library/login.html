<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
</head>
<body>

<h2>Авторизация</h2>

<form method="post">
    {% csrf_token %}

    <p>
        Логин:
        <input type="text" name="username">
    </p>

    <p>
        Пароль:
        <input type="password" name="password">
    </p>

    <button type="submit">
        Войти
    </button>

</form>

</body>
</html>
